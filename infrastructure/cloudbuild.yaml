# ══════════════════════════════════════════════════════════════════════════════
# EyeGuide — Cloud Build Configuration
# 
# Automated CI/CD pipeline for building and deploying EyeGuide to Cloud Run.
#
# Trigger this build:
#   gcloud builds submit --config infrastructure/cloudbuild.yaml .
# ══════════════════════════════════════════════════════════════════════════════

steps:
  # Step 1: Copy frontend to backend/static for serving
  - name: 'ubuntu'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cp -r frontend backend/static
        echo "Frontend files copied to backend/static/"

  # Step 2: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest'
      - './backend'

  # Step 3: Push Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'GOOGLE_GENAI_USE_VERTEXAI=TRUE,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION}'

# Substitution variables (can be overridden at build time)
substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'eyeguide'
  _IMAGE_NAME: 'eyeguide-backend'
  _AR_REPO: 'eyeguide-repo'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY

# Docker images to push
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest'

timeout: '1200s'
